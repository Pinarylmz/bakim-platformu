<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory - UAV BakÄ±mda</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
</head>
<body class="dashboard-body">
        <nav class="sidebar" id="sidebar">
        <div class="logo-area-small">
            <div class="logo-icon-small"></div>
            <h2>UAV Bakımda</h2>
        </div>
        <ul class="nav-links">
            <li class=""><a href="dashboard.html">Dashboard</a></li>
            <li class="active"><a href="inventory.html">Inventory</a></li>
            <li class=""><a href="damage_reports.html">Damage Reports</a></li>
            <li class=""><a href="personnel.html" class="admin-only" style="display:none;">Personnel Tracking</a></li>
            
            <li><a href="#" id="logoutBtn">Logout</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <header class="top-header">
            <div>
                <h1>Inventory Management</h1>
                <p>Manage and track UAV components.</p>
            </div>
            <div style="display: flex; gap: 10px; align-items: center;">
                <select id="filterUavSelect" style="padding: 8px 12px; border-radius: 6px; background: var(--input-bg); border: 1px solid var(--border-color); color: white;">
                    <option value="all">All UAVs</option>
                </select>
                <button id="openAddPartModalBtn" class="btn-primary" style="margin: 0;">+ Add New Part</button>
            </div>
        </header>

        <section class="inventory-section">
            <div style="overflow-x:auto;">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Part No (SN)</th>
                            <th>Name</th>
                            <th>Category</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryBody">
                        <!-- Loaded via JS -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Add/Edit Part Modal -->
        <div class="parts-panel-overlay" id="addPartModal">
            <div class="parts-panel-content" style="max-width: 500px; height: auto; border-radius: 12px; margin: 10vh auto;">
                <div class="panel-header">
                    <h3 id="partModalTitle">Add New Part</h3>
                    <button class="close-btn" id="closeAddPartModalBtn">&times;</button>
                </div>
                <div class="panel-body">
                    <div class="qr-reader-container" style="margin-bottom: 20px;">
                        <div id="qr-reader"></div>
                    </div>
                    <form id="addPartForm">
                        <input type="hidden" id="partId">
                        <div class="input-group">
                            <label>Serial Number (Optional - Auto Generated if blank)</label>
                            <input type="text" id="partSerial" style="width: 100%; padding: 14px; background: var(--input-bg); border: 1px solid var(--border-color); color: white; border-radius: 8px;">
                        </div>
                        <div class="input-group">
                            <label>Part Name</label>
                            <input type="text" id="partName" required style="width: 100%; padding: 14px; background: var(--input-bg); border: 1px solid var(--border-color); color: white; border-radius: 8px;">
                        </div>
                        <div class="input-group">
                            <label>Category</label>
                            <select id="partCategory" required style="width: 100%; padding: 14px; background: var(--input-bg); border: 1px solid var(--border-color); color: white; border-radius: 8px;">
                                <option value="" disabled selected>Select Category...</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>UAV Assignment</label>
                            <select id="partUavId" required style="width: 100%; padding: 14px; background: var(--input-bg); border: 1px solid var(--border-color); color: white; border-radius: 8px;">
                                <option value="" disabled selected>Select UAV...</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Max Flight Hours</label>
                            <input type="number" step="0.1" id="partMaxHours" required style="width: 100%; padding: 14px; background: var(--input-bg); border: 1px solid var(--border-color); color: white; border-radius: 8px;">
                        </div>
                        <p id="partError" class="error-message"></p>
                        <button type="submit" class="btn-primary" style="width: 100%;">Save Part</button>
                    </form>
                </div>
            </div>
        </div>
    

</main>

        <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="js/inventory.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sync.js"></script>


    
    </div>
    
</div>

</body>
</html>
